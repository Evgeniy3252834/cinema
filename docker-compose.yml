version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cinematch-postgres
    environment:
      POSTGRES_DB: cinematch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - cinematch-network

  mongodb:
    image: mongo:6
    container_name: cinematch-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - cinematch-network

  redis:
    image: redis:7
    container_name: cinematch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cinematch-network

  qdrant:
    image: qdrant/qdrant
    container_name: cinematch-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - cinematch-network

  neo4j:
    image: neo4j:5
    container_name: cinematch-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    networks:
      - cinematch-network
  rabbitmq:
    image: rabbitmq:management
    container_name: cinematch-rabbitmq
    hostname: my-rabbit
    ports:
      - "5672:5672"      # AMQP порт для приложений
      - "15672:15672"    # Management UI порт
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cinematch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  rabbitmq_data:

networks:
  cinematch-network:
    driver: bridge
