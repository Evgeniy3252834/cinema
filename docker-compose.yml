version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cinematch-postgres
    environment:
      POSTGRES_DB: cinematch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cinematch-network

  neo4j:
    image: neo4j:5
    container_name: cinematch-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - cinematch-network

  redis:
    image: redis:7
    container_name: cinematch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cinematch-network

volumes:
  postgres_data:
  neo4j_data:
  redis_data:

networks:
  cinematch-network:
    driver: bridge
